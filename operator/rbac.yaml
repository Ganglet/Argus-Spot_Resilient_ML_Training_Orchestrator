apiVersion: v1
kind: ServiceAccount
metadata:
  name: argus-operator
  namespace: default
  annotations:
    # Populated when running on real EKS (Week 6).
    # On Minikube this annotation is ignored — operator uses the ServiceAccount token directly.
    eks.amazonaws.com/role-arn: "arn:aws:iam::844641713781:role/argus-operator-irsa"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argus-operator
rules:
  # Manage SpotResilientJob resources + their status subresource
  - apiGroups: ["argus.io"]
    resources: ["spotresilientjobs", "spotresilientjobs/status"]
    verbs: ["get", "list", "watch", "patch", "update"]

  # Read nodes to find which node a training pod is running on
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch"]

  # Read and delete pods (cordon triggers pod eviction)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]

  # Create new pods on fallback nodes
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create"]

  # kopf needs to store its state in events and configmaps
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argus-operator
subjects:
  - kind: ServiceAccount
    name: argus-operator
    namespace: default
roleRef:
  kind: ClusterRole
  name: argus-operator
  apiGroup: rbac.authorization.k8s.io
