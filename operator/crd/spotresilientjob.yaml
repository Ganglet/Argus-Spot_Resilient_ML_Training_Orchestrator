apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: spotresilientjobs.argus.io
spec:
  group: argus.io
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [image, command, checkpointPath, riskThreshold, instanceFallback]
              properties:
                image:
                  type: string
                  description: Docker image for the training job
                command:
                  type: array
                  items:
                    type: string
                  description: Command to run inside the container
                checkpointPath:
                  type: string
                  pattern: "^s3://.+"
                  description: S3 URI where training job saves checkpoints (no trailing slash)
                checkpointIntervalSteps:
                  type: integer
                  minimum: 1
                  default: 500
                  description: Training job saves a checkpoint every N steps
                riskThreshold:
                  type: number
                  minimum: 0.0
                  maximum: 1.0
                  description: Operator triggers checkpoint+migrate when risk_score exceeds this
                instanceFallback:
                  type: array
                  minItems: 1
                  items:
                    type: string
                  description: Ordered list of fallback instance types if current node is evicted
            status:
              type: object
              properties:
                lastRiskScore:
                  type: number
                  description: Most recent risk score from the prediction service
                lastCheckpointStep:
                  type: integer
                  description: Training step at which the last checkpoint was flushed
                phase:
                  type: string
                  enum: [Pending, Running, Checkpointing, Migrating, Completed, Failed]
                  description: Current lifecycle phase of the job
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: RiskScore
          type: number
          jsonPath: .status.lastRiskScore
        - name: CheckpointStep
          type: integer
          jsonPath: .status.lastCheckpointStep
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: spotresilientjobs
    singular: spotresilientjob
    kind: SpotResilientJob
    shortNames:
      - srj
